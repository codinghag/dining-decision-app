# Supabase project config. `project_id` should match your linked project ref
# once you run `supabase link`. This file is safe to commit.
project_id = "dining-decision-app"

[functions.places-search]
verify_jwt = true

[functions.places-details]
verify_jwt = true

[functions.places-resolve-link]
verify_jwt = true

# Public: a plain <img>/<Image> can't send an auth header. The function only
# proxies a validated Google place-photo resource name.
[functions.places-photo]
verify_jwt = false

[functions.resolve-social-post]
verify_jwt = true

[functions.join-collection]
verify_jwt = true

[functions.start-decide-session]
verify_jwt = true
